<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SM Performance Reports — Weekly Trends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="reports.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">📊</span> SM Performance Reports</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="dashboard.html">TargetSetter</a>
      <a href="reports.html" class="active">Reports</a>
      <a href="live.html">Live</a>
      <button id="refreshBtn" class="refresh-btn" title="Pull the latest data">
        <span class="refresh-ico">⟳</span><span class="refresh-txt">Refresh</span>
      </button>
      <span id="status" class="status status--demo">Demo</span>
    </nav>
  </header>

  <div id="loading" class="loading">
    <span class="spinner"></span>
    <span class="loading-txt">Loading reports…</span>
  </div>

  <!-- Overlay shown while refreshing already-loaded data -->
  <div id="refreshOverlay" class="refresh-overlay" hidden>
    <div class="refresh-box">
      <span class="spinner spinner--lg"></span>
      <span class="refresh-msg">Pulling latest data…</span>
    </div>
  </div>

  <main id="app" class="wrap" hidden>
    <!-- Two-column layout: Target + Chart side by side -->
    <div class="two-col">
      <!-- LEFT: Annual Views target achievement (FY Apr–Mar, Views only) -->
      <section class="card target-card" id="targetCard" hidden>
        <div class="table-head">
          <h3>🎯 Annual Views Target</h3>
          <span id="targetMeta" class="meta"></span>
        </div>
        <div id="targetBody" class="target-body"></div>
      </section>

      <!-- RIGHT: Chart (with integrated controls + KPI strip) -->
      <section class="card chart-card">
        <!-- Inline controls inside the chart -->
        <div class="chart-controls">
          <div class="ctrl">
            <label for="brandSel">Brand</label>
            <select id="brandSel"></select>
          </div>
          <div class="ctrl">
            <label for="platSel">Platform</label>
            <select id="platSel"></select>
          </div>
          <div class="ctrl">
            <label for="metricSel">Parameter</label>
            <select id="metricSel"></select>
          </div>
          <div class="ctrl">
            <label for="rangeSel">Date range</label>
            <select id="rangeSel">
              <option value="1">Last week</option>
              <option value="4">Last month (4 weeks)</option>
              <option value="12" selected>Last quarter (12 weeks)</option>
              <option value="52">Last year (52 weeks)</option>
              <option value="all">All weeks</option>
              <option value="custom">Custom…</option>
            </select>
          </div>
          <div class="ctrl custom-range" id="customRange" hidden>
            <label>Custom weeks</label>
            <div class="custom-inputs">
              <select id="fromWeek"></select>
              <span class="dash">→</span>
              <select id="toWeek"></select>
            </div>
          </div>
        </div>

        <div class="chart-head">
          <h2 id="chartTitle">—</h2>
          <span id="chartMeta" class="meta"></span>
        </div>

        <!-- KPI summary strip -->
        <section class="kpis" id="kpis"></section>

        <div class="chart-box">
          <canvas id="chart"></canvas>
        </div>
        <div id="noData" class="no-data" hidden>No data available for this selection.</div>
      </section>
    </div>

    <!-- Data table -->
    <section class="card">
      <div class="table-head">
        <h3>Weekly values</h3>
        <button id="csvBtn" class="csv-btn">⬇ Export CSV</button>
      </div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr><th>Week</th><th id="valCol">Value</th><th>WoW change</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="reports-config.js"></script>
  <script src="reports-data.js"></script>
  <script src="reports-targets.js"></script>
  <script src="reports.js"></script>
</body>
</html>
